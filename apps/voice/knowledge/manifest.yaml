# Phase 7 knowledge manifest (D-01) -- the curated, N-topic source of truth
# for the router's per-topic deep packs. Auto-discovery of repos is explicitly
# rejected (D-01/D-02): every source below was hand-picked as public-safe.
#
# tour_priority (D-05): the order KPH re-pitches topics in tour mode -- a
# one-line edit re-orders the whole tour, no code change.
#
# Schema is deliberately N-topic-ready (Amendment 1/5): only klanker-maker is
# populated today, but 07-03 only APPENDS entries here -- it must never need
# to change this file's shape.
#
# Each topic:
#   id            -- stable slug, matches router/topic-map.yaml's topic id
#   spoken_name   -- TTS-friendly name (see topic-map.yaml for the same field)
#   pack          -- filename under [knowledge].packs_dir (config.py)
#   sources       -- corpus provenance for the offline refresh workflow
#                     (07-04's `make -C apps/voice knowledge`); kind is one of
#                     docs | code | transcript | diagram. A source outside
#                     this repo (e.g. a sibling local checkout) is marked
#                     skip_if_missing so refresh degrades gracefully when run
#                     on a machine without that checkout.
#   public        -- REQUIRED (07-04, D-02): every source must explicitly
#                     say `public: true` -- hand-verified public-safe by
#                     Kurt. refresh_knowledge.py's read_manifest() refuses
#                     (excludes, does not crash) any source missing this
#                     flag or set to false; a bare comment claiming
#                     "public-safe" is not enough, the flag itself is what
#                     the refresh checks.

