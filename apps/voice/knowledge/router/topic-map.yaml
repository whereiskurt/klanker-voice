# Phase 7 router topic-map (RESEARCH Pattern 2, Amendment 1/5). Weighted
# keyword/alias lists the keyword-first router (klanker_voice.knowledge.
# router.classify) scores an utterance against. confidence_floor is the
# minimum summed weight before the router trusts a keyword match; below it,
# KnowledgeRouterProcessor falls back to a single same-vendor Haiku
# classification call (PIPE-07: never a 4th vendor) rather than guessing
# (Pitfall 1).
#
# Each keyword entry: {term, weight}. Higher weight = more distinctive
# (multi-word phrases and the topic's own name); lower weight = common words
# that only count alongside other matches ("the platform", "sandbox" alone
# shouldn't confidently commit to a topic).
#
# hook: a single spoken-friendly sentence rendered for EVERY topic into the
# stable-prefix topic-map (block0, prompt_assembly.render_topic_hooks) so KPH
# can always name what it knows about, even before a deep pack loads.

version: 1
confidence_floor: 2

topics:
  - id: klanker-maker
    spoken_name: "klanker-maker"
    hook: >-
      Kurt's AI-agent runtime -- a Go CLI called km that turns a YAML file
      into a locked-down AWS sandbox where coding agents can run untrusted
      code safely, with kernel-level network filtering and a hard dollar
      budget.
    keywords:
      - term: "klanker maker"
        weight: 3
      - term: "klanker-maker"
        weight: 3
      - term: "klankermaker"
        weight: 3
      - term: "clanker maker"        # common ASR mis-hearing of "klanker"
        weight: 3
      - term: "clanker-maker"
        weight: 3
      - term: "klanker"
        weight: 2
      - term: "clanker"
        weight: 1                    # weak alone -- also a generic internet meme word
      - term: "km cli"
        weight: 2
      - term: " km "
        weight: 1
      - term: "the platform"
        weight: 1
      - term: "sandbox"
        weight: 1
      - term: "sandboxes"
        weight: 1
      - term: "ebpf"
        weight: 2
      - term: "sandboxprofile"
        weight: 2
      - term: "budget enforcement"
        weight: 1
      - term: "agent runtime"
        weight: 1

  - id: defcon-run-34
    spoken_name: "DEFCON dot run, thirty-four"
    hook: >-
      Kurt's DEF CON Run community platform -- sign up, plan Las Vegas run
      routes in a real GPX editor, GPS check in, and flash a Meshtastic
      radio, all from a multi-region AWS webapp.
    keywords:
      - term: "defcon dot run"
        weight: 3
      - term: "defcon.run"
        weight: 3
      - term: "defcon run"
        weight: 3
      - term: "def con run"
        weight: 3
      - term: "defcon.run.34"
        weight: 3
      - term: "thirty four"          # spoken "thirty-four" edition name
        weight: 1
      - term: "run auth"
        weight: 2
      - term: "run.auth"
        weight: 2
      - term: "run.human"
        weight: 2
      - term: "run.gpx"
        weight: 2
      - term: "gpx editor"
        weight: 2
      - term: "meshtastic flasher"
        weight: 2
      - term: "race bib"
        weight: 2
      - term: "check in"
        weight: 1
      - term: "gps check"
        weight: 1
      - term: "multi region"
        weight: 1
      - term: "cloudfront"
        weight: 1
      - term: "waffaw"
        weight: 2

  - id: meshtk
    spoken_name: "mesh T K, the meshtastic toolkit"
    hook: >-
      Kurt's Go toolkit for virtual Meshtastic nodes -- software-only mesh
      radios over MQTT, a fleet simulator, and a packet-inspecting security
      proxy, running live at DEF CON in support of defcon.run.
    keywords:
      - term: "mesh tk"
        weight: 3
      - term: "meshtk"
        weight: 3
      - term: "mesh t k"
        weight: 3
      - term: "meshtastic toolkit"
        weight: 3
      - term: "meshtastic"
        weight: 2
      - term: "mesh radio"
        weight: 2
      - term: "virtual node"
        weight: 2
      - term: "ghost fleet"
        weight: 2
      - term: "mqtt broker"
        weight: 2
      - term: "meshmap"
        weight: 2
      - term: "mesh network"
        weight: 1
      # NOTE (Pitfall 1, RESEARCH): "toolkit" alone is deliberately NOT a
      # keyword here -- it is generic-enough (any dev-tools question) that
      # keying on it would over-trigger a meshtk classification on an
      # unrelated "toolkit" utterance. Only the distinctive multi-word forms
      # above ("mesh tk", "meshtastic toolkit", etc.) count.

  # klanker-voice (self) and any further topics: append the same shape here
  # plus a matching manifest.yaml topic (Amendment 1/5) -- this schema does
  # not change.
