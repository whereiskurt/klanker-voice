# bargein_monologue: provoke the longest plausible answer and interrupt late,
# deep into the monologue (PIPE-02, PITFALLS #3).
#
# send_after anchors 2500ms after bot speech starts (latest tts_response), so
# the interruption lands well inside the spoken monologue rather than at its
# start.
#
# NOTE (RESEARCH Pitfall 7): within_ms measures the harness clock — pass/fail
# plumbing only; it never feeds the D-11 latency table.
name: bargein_monologue
user:
  modality: audio
  speech:
    service: kokoro
    voice: af_heart
judge:
  modality: audio
  transcription:
    service: moonshine
  eval:
    factory: "klanker_voice.harness.judge.judge_factory"
turns:
  # Observe the D-04 greeting so later anchors track the provoked answer.
  - expect:
      - event: tts_response
  # Provoke the longest plausible answer.
  - user: "I want the full deep dive. Tell me everything you know about Kurt, the klanker platform, and defcon run. Do not stop until I say so."
    expect:
      - event: llm_started
      - event: tts_response
  # Interrupt late, deep into the monologue.
  - user: "Okay okay, stop there. Summarize all of that in one sentence."
    send_after: { event: tts_response, delay_ms: 2500 }
    expect:
      # Discard-proof interrupt assertion (see bargein_early.yaml): the
      # transcription proves user speech registered through the real path.
      - event: user_transcription
      - event: response
        within_ms: 30000
        eval: >-
          Judge ONLY these two things and answer yes when both hold: (1) the
          reply reacts to the interruption with something brief (a compressed
          summary or acknowledgment, not another monologue), and (2) it does
          not restart or repeat the interrupted monologue verbatim. Do NOT
          judge the quality, accuracy, or completeness of the summary itself,
          and ignore transcription noise
