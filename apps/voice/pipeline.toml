# pipeline.toml — the single stage-selection surface for the klanker-voice pipeline.
#
# No credential material, ever (D-09). Provider keys come exclusively from
# environment variables (.env, written by `make -C apps/voice env`). config.py
# rejects any field whose name looks like credential material.
#
# This file is consumed unchanged by the Phase 4 deployed service — keep the
# schema boring and stable. A/B arm configs (configs/arm-*.toml) reuse this
# exact schema and are selected via the KLANKER_PIPELINE_CONFIG env var.

label = "KPH(v1)"  # subtle live-UI display tag (Task 1, 260710-ixf)

[stt]
provider = "deepgram-nova3"     # "deepgram-nova3" | "deepgram-flux"
model = "nova-3-general"

[stt.flux]                      # only read when stt.provider = "deepgram-flux"
eot_threshold = 0.7             # end-of-turn confidence, 0.5-0.9 (Flux default 0.7)
eager_eot_threshold = 0.0       # 0 = disabled; nonzero trades LLM spend for latency

[turn]                          # ignored when stt.provider = "deepgram-flux"
strategy = "smart_turn_v3"      # "vad_timeout" | "smart_turn_v3"
vad_stop_secs = 0.2
user_speech_timeout = 0.6

[llm]
provider = "anthropic"
model = "claude-haiku-4-5"      # mandatory override: pipecat 1.5.0 defaults to a Sonnet model

[tts]
provider = "elevenlabs"
model = "eleven_flash_v2_5"
voice_id = "EIDLidDc73oTUWAedVPt"  # "Burt Fundeck" — swap-in 2026-07-07. Replaces "Mark" (UgBBYS2sOqTuMpoF3BR0, temporary). Prior: KPHv1 (6zcBdCPOI1TDYCTSsqUv, Kurt clone, retrained/deleted). IMPORTANT: on any voice_id change, re-run `make -C apps/voice greetings` and commit the new clips — the slick-start greeting drift guard (tests/test_greeting_voice_drift.py, B-04) fails CI otherwise.
speed = 1.02                    # ElevenLabs WS range 0.7-1.2 (07.1 lab setting 1.0; 260709 nudged to 1.08 — a bit faster)
# 07.1 tunable voice character (ElevenLabs voice_settings, 0.0-1.0), from Kurt's
# lab screenshot. Applied to BOTH the live voice and the pre-rendered greeting
# (render_greetings.py reads these same values). Retune here, then re-run
# `make -C apps/voice greetings` to keep the welcome clip matched.
stability = 0.45                # lower = more expressive/variable; higher = steadier (260709: 0.4 -> 0.32, more expressive)
similarity_boost = 0.85         # fidelity to the source voice
style = 0.3                     # low = calm; high = over-the-top (260709: 0.1 -> 0.3, more enthusiasm)

[persona]
prompt_path = "prompts/concierge.md"
greet_first = false   # client plays a pre-rendered greeting on tap (slick-start); server must not greet twice

[knowledge]                                    # Phase 7 router + cached knowledge packs (D-01/D-13)
manifest = "knowledge/manifest.yaml"           # curated N-topic manifest (D-01), tour priority order (D-05)
topic_map = "knowledge/router/topic-map.yaml"  # router keywords/aliases + confidence floor
packs_dir = "knowledge/topics"                 # per-topic deep packs (block1, swappable)
style_path = "knowledge/style/kurt-voice.md"   # Kurt STYLE layer (block0, stable/cached prefix)
cache_floor = 4096                             # Haiku 4.5's minimum cacheable system-prefix (D-13)

# 07-02: local BM25/FTS5 retrieval (Amendment 3-A/B/C, PIPE-07) -- keyless, in-process
index_dir = "knowledge/index"                  # committed per-topic chunk files (knowledge/index/{topic}/*.jsonl)
retrieval_enabled = true                       # off -> router never queries (behavior == Plan 01)
retrieval_top_k = 4                            # top-k chunks injected into system[1] per deep turn
retrieval_budget = 1500                        # approx-token cap on injected chunk text (named to avoid
                                                # _CREDENTIAL_FIELD_RE's _token(s) rejection; see config.py)

[quota]                            # QUOT-01/02/03/04/05, D-01..D-09/D-14 (04-04/04-05)
heartbeat_renew_interval = 15      # seconds between concurrency-lease renewals + accounting ticks
heartbeat_ttl = 45                 # seconds; a crashed task's lease self-expires after this (3x renew interval)
sub_floor_seconds = 30             # D-03: block a new session if remaining daily time is below this
per_task_max_sessions = 5          # D-14: per-task soft cap (design spec ~5 concurrent/task) -> retryable reject
auto_trip_ceiling_seconds = 7200   # D-09: site-wide daily seconds ceiling (2h aggregate) -> auto-engage kill-switch
auto_trip_ceiling_dollars = 40     # D-09: site-wide daily est.-cost ceiling (coarse; ~$120-165/mo budget / ~4 active days)
est_cost_per_second = 0.005        # coarse blended Deepgram+Haiku+ElevenLabs estimate (~$18/hr); precision deferred (CONTEXT.md)

# 04-05: spoken wind-down + layered idle teardown (QUOT-03/QUOT-05, D-04..D-07)
winddown_warning_seconds = 30      # D-04: lead time before session_max the warning is injected
goodbye_grace_seconds = 5          # D-05: cap on letting the deterministic goodbye TTS finish before hard-close
user_silence_timeout = 50          # D-06 layer 2: no user speech for this long (45-60s band) -> teardown
reconnect_grace_seconds = 12       # D-07: transport-disconnect grace (10-15s band) before teardown

warning_copy = "Just a heads up: we're coming up on the time limit for this chat, so let's start wrapping up."
goodbye_copy = "That's my cue to go — thanks for chatting, take care!"

[greenhouse]                        # coffee-shop ambient bed for recruiting mode (260710)
ambience_enabled = true             # SoundfileMixer under the voice while greenhouse is active
ambience_sound = "coffee-shop"      # assets/ambience/{ambience_sound}.wav (mono, 24kHz)
ambience_volume = 0.06              # subtle (0.0-1.0); tune live
ambience_sample_rate = 24000        # must match the WAV + output transport (mixer won't resample)
