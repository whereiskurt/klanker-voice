# configs/telephony.toml — harness config for the standalone telephony
# entrypoint (Phase 11 Plan 07, D-08). Full pipeline.toml clone (same
# schema/tables the pipeline needs) with ONE behavior difference:
# [telephony].enabled = true.
#
# Selected via:
#   KLANKER_PIPELINE_CONFIG=configs/telephony.toml uv run python -m klanker_voice.telephony.controller
#
# All relative paths below (persona.prompt_path, [knowledge].* ) are
# resolved relative to THIS file's own directory (apps/voice/configs/), per
# config.py's documented resolution convention (same "../" pattern as
# configs/arm-a.toml's persona.prompt_path) — so they climb one directory
# back up to apps/voice/.
#
# No credential material, ever (D-09). ARI creds (ASTERISK_ARI_URL/
# ASTERISK_ARI_USERNAME/ASTERISK_ARI_PASSWORD) and the §24 gate secrets
# (TELEPHONY_ACCESS_PIN/TELEPHONY_PASSPHRASE_WORDS) are env-only — read by
# telephony/__main__.py and telephony/controller.py respectively, never
# written here. config.py's shared credential-field-name regex would refuse
# them here even if someone tried.

label = "KPH(telephony-harness)"

[stt]
provider = "deepgram-nova3"
model = "nova-3-general"

[stt.flux]
eot_threshold = 0.7
eager_eot_threshold = 0.0

[turn]
strategy = "smart_turn_v3"
vad_stop_secs = 0.2
user_speech_timeout = 0.6

[llm]
provider = "anthropic"
model = "claude-haiku-4-5"

[tts]
provider = "elevenlabs"
model = "eleven_flash_v2_5"
voice_id = "EIDLidDc73oTUWAedVPt"  # matches the shipped pipeline.toml voice ("Burt Fundeck")
speed = 1.02
stability = 0.45
similarity_boost = 0.85
style = 0.3

[persona]
prompt_path = "../prompts/concierge.md"
greet_first = false  # the §24 gate fires the greeting itself at unlock (D-05c), not on answer

[knowledge]
manifest = "../knowledge/manifest.yaml"
topic_map = "../knowledge/router/topic-map.yaml"
packs_dir = "../knowledge/topics"
style_path = "../knowledge/style/kurt-voice.md"
cache_floor = 4096
index_dir = "../knowledge/index"
retrieval_enabled = true
retrieval_top_k = 4
retrieval_budget = 1500

[quota]
heartbeat_renew_interval = 15
heartbeat_ttl = 45
sub_floor_seconds = 30
per_task_max_sessions = 5
auto_trip_ceiling_seconds = 7200
auto_trip_ceiling_dollars = 40
est_cost_per_second = 0.005
winddown_warning_seconds = 30
goodbye_grace_seconds = 5
user_silence_timeout = 120           # (260714) 50→120: a phone caller who pauses to think must not get dropped. This now measures TRUE mutual silence — bot-speaking time no longer counts against the caller (session.py TeardownObserver resets on bot speech). 120s of post-bot-turn silence reclaims a genuinely abandoned call; the public 3-min session cap bounds it either way.
reconnect_grace_seconds = 12
warning_copy = "Just a heads up: we're coming up on the time limit for this chat, so let's start wrapping up."
goodbye_copy = "That's my cue to go — thanks for chatting, take care!"

[telephony]                         # Phase 11 (D-09): media + §24 answer-gate knobs ONLY.
enabled = true                      # THE difference from pipeline.toml — this is the telephony harness
provider = "voipms"                 # upstream SIP trunk provider (Phase 12+)
edge = "asterisk-ari"                # local call-control edge (spec §7/§13)
codec = "pcmu"                       # μ-law, matches Phase 10 media.py (no codec change)
sample_rate = 8000                   # PCMU clock rate, Hz
packet_ms = 20                       # RTP packetization interval
max_concurrent_calls = 4             # PERMITS 4 simultaneous ARI calls at the SOFTWARE layer only (260714). ⚠️ The single telephony-edge task (task_cpu=2048/2 vCPU, desired_count=1) is still sized for ONE call — truthful 4-concurrent capacity requires the DEFERRED capacity slice: service.hcl vCPU/memory bump + a real 4-call load test (brief Part B / D2). This knob only permits, it does not deliver, 4 clean concurrent calls.
answer_timeout_seconds = 15          # bridge/external-media readiness deadline
hangup_on_pipeline_error = true      # tear the call down rather than leave a silent open line
# §24 silent answer-gate (D-05): stays dark (no greeting/LLM/TTS) until unlock
require_gate = true                  # master switch; false is a test/dev-only escape hatch
gate_mode = "either"                 # "dtmf" | "passphrase" | "either" (D-05b: both factors, either unlocks)
gate_window_seconds = 20             # fail-closed goodbye + hangup if neither factor lands in time (D-05d). Bumped 10→20 (260714): the pickup-cue ring+"hey" (~4s) + caller reaction + Deepgram finalization (~2.8s) overran the old 10s window — live call showed the caller speaking at ~6.6s but STT finalizing after fail-closed.
gate_debug_log_heard = true          # ENABLED 260714 (operator KPH) to debug an accent/STT miss on the passphrase (a caller with an Indian accent couldn't pass "hack the planet"). TEMPORARY: gather a few real gate_fail_heard{...} lines, then flip back to false once the phase-2 fix (Deepgram keyterm boosting favored) lands. OPT-IN debug; default is false (keeps D-05e byte-identical). When true, a fail-closed call (gate-window expiry, no unlock) logs ONE gate_fail_heard{call_id, caller_id, heard_tokens, token_count} line to telephony-edge CloudWatch — the caller's number + what STT actually heard — for accent/STT debugging of the passphrase. Deliberate D-05e relaxation for the FAIL path ONLY: a failed attempt's heard words are by definition not the passphrase (no secret leak); NEVER on the success path; NEVER logs the passphrase words or the DTMF PIN. Flip to true + redeploy telephony-edge to gather real failed attempts.
unlock_tier_id = "pstn-public-tier"  # tier granted on successful gate unlock (minimal identity seam, D-05a). Dedicated PUBLIC from-anywhere caller tier (session 180s / period 900s / maxConcurrent 4), created live in kmv-auth-electro (thin-token, no redeploy) — see docs/operators/phase12-seed-data.md Task 3. Replaces the prior kph-tier grant (Kurt's own 24h tier stays untouched). NOTE: caller-ID→code mint (tel_mint_url) still resolves entitled callers to THEIR tier; this is only the fallback for un-entitled public callers. The row MUST exist live before this resolves — an absent tier fails closed (no-access).
# Secrets (ARI creds, PIN, passphrase words) live in env/SSM, NEVER here (D-09):
# ASTERISK_ARI_URL, ASTERISK_ARI_USERNAME, ASTERISK_ARI_PASSWORD,
# TELEPHONY_ACCESS_PIN, TELEPHONY_PASSPHRASE_WORDS.

# Per-DID SMS reply via Approach C -- VoIP.ms per-DID "Caller ID name prefix"
# (quick 260717-buf, CONFIRMED live 2026-07-17). VoIP.ms prepends each DID's
# configured prefix to the inbound caller-ID NAME, which arrives in the SIP From
# display name -> ${CALLERID(name)} at the edge. The controller matches a tag
# here anchored at the START of CALLERID(name) (exact when the caller has no
# CNAM, or the tag PREPENDED to a CNAM otherwise) -> resolves the dialed DID with
# NO routing change (DIDs stay on the shared 557010_klanker-pbx sub-account).
# Keys = the VoIP.ms callerid_prefix set per DID (setDIDInfo callerid_prefix);
# values = the bare-digit DID. Tags + DIDs are PUBLIC (no secret). LIVE-STEP:
# each DID's callerid_prefix must be set in VoIP.ms to the matching key here.
[telephony.cid_prefix_dids]
"KVD3234" = "7254043234"
"KVD3283" = "7254043283"

# CTF phone-OTP announcement (quick task 260716-1g0, Revision 2 -- design doc
# docs/superpowers/specs/2026-07-15-ctf-phone-otp-announcement-did-design.md,
# "Revision 2 (2026-07-16) -- DTMF-code trigger, not DID" section). A caller
# INSIDE the existing §24 answer-gate who enters the armed DTMF code hears
# the current OTP (digit-spaced, twice) and the line hangs up -- no mint, no
# quota, no concierge. Revision 1's DID-keyed pre-gate dispatch never fired
# on a live call: VoIP.ms routes all DIDs to one sub-account, so the dialed
# number is not visible at the edge. otp_env_var/code_env_var carry only env
# var NAMES; the CTF_OTP_AUTH_TOKEN bearer and the CTF_ANNOUNCEMENT_CODE
# trigger value are env/SSM-only, never here (D-09).
[[telephony.announcement]]
otp_url = "https://auth.klankermaker.ai/use1/ctf/otp"
otp_env_var = "CTF_OTP_AUTH_TOKEN"     # NAME only; token VALUE from env/SSM at call time (D-09)
code_env_var = "CTF_ANNOUNCEMENT_CODE"  # NAME only; trigger VALUE lives in SSM (/kmv/secrets/use1/ctf/announcement_code), never TOML (D-09)
line_template = "Hey! Let me get you that O T P. {code}. That's {code}."
# did = "7254043234"   # informational only -- NOT visible at the edge (all DIDs arrive as the sub-account 557010_klanker-pbx)
# SMS-during-call (quick task 260716-hg5 -- design doc docs/superpowers/specs/
# 2026-07-16-ctf-otp-sms-during-call-design.md): text the caller a written copy
# of the OTP mid-call, then land the "check your phone" punchline. Ordered pool
# of SMS-capable VoIP.ms sending DIDs -- tried IN ORDER until one send succeeds
# (runtime auto-fallback). PUBLIC DID digits only; the VoIP.ms API creds are
# env/SSM-only (VOIPMS_API_USERNAME/VOIPMS_API_PASSWORD), never here. Empty /
# absent ⇒ feature OFF. 6134805878 is the only SMS-enabled DID as of 2026-07-16
# (verified via getDIDsInfo); enable SMS on the others in the portal + append
# them here for fallback depth.
# EMPTY (quick 260717-buf): with per-DID reply now resolving via CALLERID(name)
# (Approach C, below), the shared fallback pool is dropped so an UNRESOLVED
# dialed DID sends NO text -- this reserves 613 (and every non-enrolled number):
# dialed a Vegas DID -> texts from itself; dialed 613 / anything unprefixed ->
# no text at all. (Was ["6134805878"]; 613 is no longer a universal sender.)
sms_dids = []
# Per-DID reply (quick 260716-hg5 → resolution rewired in 260717-buf): each
# ENROLLED dialed DID replies FROM ITSELF. The controller now resolves the
# dialed DID from the per-DID Caller ID name prefix in ${CALLERID(name)} (see
# [telephony.cid_prefix_dids] above -- Approach C, live-confirmed 2026-07-17);
# the dead SIP To: header stays only as a last-ditch fallback. Selection:
# enrolled dialed DID -> text from THAT DID; a resolved-but-unenrolled DID -> NO
# text; an unresolved dialed DID -> the (now empty) sms_dids pool -> no text.
# Both Las Vegas DIDs are enrolled (SMS-enabled 2026-07-16).
sms_reply_dids = ["7254043234", "7254043283"]
# The SMS is sent by POSTing to the auth app's internal /ctf/sms relay (quick
# 260716-hg5 follow-up), NOT by calling VoIP.ms from here: VoIP.ms's API is
# IP-allowlisted and this task's Fargate egress IP is ephemeral, while auth
# egresses from the stable, whitelisted NAT EIP. The relay bearer reuses
# otp_env_var (CTF_OTP_AUTH_TOKEN). Empty ⇒ no SMS is sent.
sms_relay_url = "https://auth.klankermaker.ai/use1/ctf/sms"
