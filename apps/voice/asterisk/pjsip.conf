; PJSIP transport + a single ulaw-only softphone endpoint (Phase 11, D-01).
;
; disallow=all / allow=ulaw is deliberate and exact: it matches the Phase 10
; PCMU (mu-law) codec byte-for-byte -- no other codec is negotiable, so the
; RTP payload this endpoint ever sends/receives is always the ulaw format
; Phase 10's RtpMediaSession/codec already understands. Do not add any other
; `allow=` line here.
;
; external_media_address / external_signaling_address / local_net are all
; 127.0.0.1: this is the macOS Docker Desktop dev-harness address so a SIP
; softphone running on the same host as the Docker Desktop VM can actually
; reach the SDP-advertised address through docker-compose's published ports
; (5060/udp + the rtp.conf range) instead of Asterisk advertising its
; internal container-bridge IP, which the host cannot reach directly.
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; external_media/signaling_address MUST be an address the host-side softphone
; can actually reach through Docker Desktop's published ports. Loopback does
; NOT work: Asterisk refuses to advertise 127.0.0.1 as an "external" address and
; falls back to the container's internal bridge IP (e.g. 172.20.0.2), which the
; host cannot route to -- so the caller's RTP is black-holed and the gate never
; hears anything. Set TELEPHONY_MEDIA_ADDRESS in .env to your host LAN IP
; (`ipconfig getifaddr en0`); render_configs.py substitutes it here. rtp_symmetric
; on the endpoint handles the return leg. (Surfaced by the §19-C live proof.)
external_media_address=${TELEPHONY_MEDIA_ADDRESS}
external_signaling_address=${TELEPHONY_MEDIA_ADDRESS}
; local_net MUST list every network Asterisk's OWN bind IP can fall in --
; that is how PJSIP decides to substitute external_media_address for a
; non-local (internet) peer. If Asterisk's own IP is NOT in local_net, it
; treats that IP as already-public and leaks it into the SDP c= line, so the
; carrier sends the caller's RTP to an unroutable private address and the
; gate hears silence. This bit us on Fargate: the task ENI is 10.0.x.x
; (VPC 10.0.0.0/16), which was absent here (only the Phase-11 Docker bridge
; 172.20.0.0/16 was listed) -- the SDP advertised the private 10.0.x.x and
; every inbound caller RTP packet was black-holed. All RFC1918 ranges are
; marked local so this holds for any VPC/bridge CIDR; 127.0.0.1/32 stays for
; the external-media loopback leg.
local_net=127.0.0.1/32
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

; Endpoint template: context=from-klanker-inbound is the ONLY dialplan
; context this endpoint can ever reach (D-01, §25.A) -- no outbound context
; exists anywhere in extensions.conf, so a compromised/misused endpoint has
; no path to place a call, ever. direct_media=no keeps all RTP flowing
; through Asterisk (required for the ARI External Media bridge, R2).
[softphone](!)
type=endpoint
context=from-klanker-inbound
disallow=all
allow=ulaw
direct_media=no
; NAT tolerance for the Docker-Desktop dev harness: a softphone on the host
; reaches Asterisk through Docker's userland NAT, so the client's advertised
; Via/Contact/SDP addresses are not reachable from inside the container.
; Reply/route to the actual packet source instead of the advertised address
; (signaling: force_rport + rewrite_contact; media: rtp_symmetric). Local-only
; dev convenience; production SIP trunking (Phase 12+) sets NAT posture per the
; VoIP.ms POP, not here.
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[softphone-aor](!)
type=aor
max_contacts=1

; Password sourced from SOFTPHONE_SIP_PASSWORD (env placeholder, D-09) --
; never a real secret committed here. This SIP password is consumed by
; Asterisk only; it is never passed into the Klanker Python process (D-09).
[softphone-auth](!)
type=auth
auth_type=userpass
username=softphone
password=${SOFTPHONE_SIP_PASSWORD}

[dev-softphone](softphone)
aors=dev-softphone
auth=dev-softphone-auth

[dev-softphone](softphone-aor)

[dev-softphone-auth](softphone-auth)

; -----------------------------------------------------------------------
; VoIP.ms SIP trunk (registration-based, Phase 12, D-01/D-04).
;
; Registration-based trunking: Asterisk REGISTERS OUTBOUND to a single
; VoIP.ms Toronto POP (below); VoIP.ms then delivers the DID's inbound call
; over that already-open registered leg -- there is NO public inbound SIP
; port opened for this trunk. The `type=identify` section's `match=` IPs
; are how Asterisk recognizes that inbound traffic as belonging to this
; endpoint; the SG-to-POP lock (12-07) is defense-in-depth on top of this,
; not the primary mechanism (12-RESEARCH.md).
;
; The registration POP (`server_uri` below) and the DID's routed POP
; (configured in the VoIP.ms portal / `kv voipms route-did`, see
; docs/operators/voipms-provisioning-runbook.md) MUST be the same Toronto
; POP -- VoIP.ms only delivers inbound calls over the registered leg when
; both match (12-RESEARCH.md, "Registration & DID Routing Requirement").
;
; The VoIP.ms SIP password is a ${VAR} placeholder here, exactly like
; SOFTPHONE_SIP_PASSWORD above -- rendered from the environment only into
; the gitignored .rendered/ dir at container start (D-04/D-09). Never a
; literal secret in this tracked file.
[voipms-auth]
type=auth
auth_type=userpass
username=${VOIPMS_SIP_USERNAME}
password=${VOIPMS_SIP_PASSWORD}

[voipms-registration]
type=registration
outbound_auth=voipms-auth
server_uri=sip:toronto.voip.ms
client_uri=sip:${VOIPMS_SIP_USERNAME}@toronto.voip.ms
contact_user=${VOIPMS_SIP_USERNAME}
retry_interval=300
expiration=3600

; max_contacts=1: only one active registration; prevents stale
; registrations from accumulating across Fargate task restarts.
[voipms-aor]
type=aor
max_contacts=1

; context=from-klanker-inbound is the ONLY dialplan context this endpoint
; can ever reach (D-01, §25.A) -- identical inbound-only posture to the
; dev-softphone endpoint above; no outbound context exists anywhere in
; extensions.conf. disallow=all/allow=ulaw matches Phase 10's PCMU codec
; byte-for-byte -- do not add any other allow= line here. direct_media=no
; forces all RTP through Asterisk (required for the ARI External Media
; bridge, R2). force_rport/rewrite_contact/rtp_symmetric give NAT
; tolerance for the VoIP.ms POP's signaling/media path.
[voipms-endpoint]
type=endpoint
context=from-klanker-inbound
disallow=all
allow=ulaw
direct_media=no
aors=voipms-aor
auth=voipms-auth
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

; Route inbound SIP from any Toronto POP to the VoIP.ms endpoint by source
; IP. All 8 Toronto POP IPs are matched (not just the registration POP)
; because VoIP.ms may deliver inbound traffic from any POP in the Toronto
; cluster (12-RESEARCH.md pitfall: a single-IP identify match blocks calls
; from a load-balanced/failover POP). Same 8 IPs as the 12-07 SG allow-list.
[voipms-identify]
type=identify
endpoint=voipms-endpoint
; Live POP IPs from getServersInfo 2026-07-12 (stale research-era list
; replaced). Keep in lockstep with telephony-sg.hcl's
; voipms_toronto_pop_cidrs — one security boundary, two files.
match=208.100.60.50
match=208.100.60.51
match=208.100.60.52
match=208.100.60.53
match=208.100.60.54
match=208.100.60.55
match=208.100.60.56
match=208.100.60.57
match=208.100.60.58
match=208.100.60.59
