; PJSIP transport + a single ulaw-only softphone endpoint (Phase 11, D-01).
;
; disallow=all / allow=ulaw is deliberate and exact: it matches the Phase 10
; PCMU (mu-law) codec byte-for-byte -- no other codec is negotiable, so the
; RTP payload this endpoint ever sends/receives is always the ulaw format
; Phase 10's RtpMediaSession/codec already understands. Do not add any other
; `allow=` line here.
;
; external_media_address / external_signaling_address / local_net are all
; 127.0.0.1: this is the macOS Docker Desktop dev-harness address so a SIP
; softphone running on the same host as the Docker Desktop VM can actually
; reach the SDP-advertised address through docker-compose's published ports
; (5060/udp + the rtp.conf range) instead of Asterisk advertising its
; internal container-bridge IP, which the host cannot reach directly.
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; external_media/signaling_address MUST be an address the host-side softphone
; can actually reach through Docker Desktop's published ports. Loopback does
; NOT work: Asterisk refuses to advertise 127.0.0.1 as an "external" address and
; falls back to the container's internal bridge IP (e.g. 172.20.0.2), which the
; host cannot route to -- so the caller's RTP is black-holed and the gate never
; hears anything. Set TELEPHONY_MEDIA_ADDRESS in .env to your host LAN IP
; (`ipconfig getifaddr en0`); render_configs.py substitutes it here. rtp_symmetric
; on the endpoint handles the return leg. (Surfaced by the §19-C live proof.)
external_media_address=${TELEPHONY_MEDIA_ADDRESS}
external_signaling_address=${TELEPHONY_MEDIA_ADDRESS}
local_net=127.0.0.1/32
local_net=172.20.0.0/16

; Endpoint template: context=from-klanker-inbound is the ONLY dialplan
; context this endpoint can ever reach (D-01, §25.A) -- no outbound context
; exists anywhere in extensions.conf, so a compromised/misused endpoint has
; no path to place a call, ever. direct_media=no keeps all RTP flowing
; through Asterisk (required for the ARI External Media bridge, R2).
[softphone](!)
type=endpoint
context=from-klanker-inbound
disallow=all
allow=ulaw
direct_media=no
; NAT tolerance for the Docker-Desktop dev harness: a softphone on the host
; reaches Asterisk through Docker's userland NAT, so the client's advertised
; Via/Contact/SDP addresses are not reachable from inside the container.
; Reply/route to the actual packet source instead of the advertised address
; (signaling: force_rport + rewrite_contact; media: rtp_symmetric). Local-only
; dev convenience; production SIP trunking (Phase 12+) sets NAT posture per the
; VoIP.ms POP, not here.
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[softphone-aor](!)
type=aor
max_contacts=1

; Password sourced from SOFTPHONE_SIP_PASSWORD (env placeholder, D-09) --
; never a real secret committed here. This SIP password is consumed by
; Asterisk only; it is never passed into the Klanker Python process (D-09).
[softphone-auth](!)
type=auth
auth_type=userpass
username=softphone
password=${SOFTPHONE_SIP_PASSWORD}

[dev-softphone](softphone)
aors=dev-softphone
auth=dev-softphone-auth

[dev-softphone](softphone-aor)

[dev-softphone-auth](softphone-auth)
