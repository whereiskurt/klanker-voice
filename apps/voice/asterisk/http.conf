; Asterisk built-in HTTP server -- required because ARI rides this server
; (Phase 11, D-01, spec §18/§25.C).
;
; bindaddr MUST NEVER be a public interface. 127.0.0.1 is correct for a
; host-run Asterisk talking to a host-run controller; inside the
; docker-compose harness the container's own loopback is equally private --
; the ARI port is published to the host via docker-compose's `ports:`
; mapping (127.0.0.1-bound on the host side too), never opened to 0.0.0.0
; on a routable interface. Cloud network-boundary enforcement (security
; groups) is Phase 14 -- this file is the config-level half of that posture.
[general]
enabled=yes
bindaddr=127.0.0.1
bindport=8088
