; Asterisk REST Interface (ARI) -- authenticated, server-to-server only
; (Phase 11, D-01/D-02, spec §18/§25.C).
;
; allowed_origins stays EMPTY: no browser ever talks to ARI directly, so no
; CORS access is needed. The password below is sourced from the
; ASTERISK_ARI_PASSWORD env placeholder (see .env.example, D-09) -- this file
; NEVER carries a real secret; only a local-dev env-var reference.
[general]
enabled=yes
pretty=yes
allowed_origins=

; The single ARI user the standalone telephony controller (D-08, a later
; plan) authenticates as. `password_format=plain` + `read_only=no` because
; the controller issues call-control writes (answer, externalMedia, bridge,
; hangup). This user is only ever reachable through http.conf's
; private/loopback bindaddr -- never exposed on a public interface.
[klanker]
type=user
password=${ASTERISK_ARI_PASSWORD}
password_format=plain
read_only=no
