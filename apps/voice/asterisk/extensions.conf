; Inbound-only dialplan (Phase 11, D-01, spec §25.A).
;
; This file contains EXACTLY ONE context and it is inbound-only: every call
; that reaches [from-klanker-inbound] is answered and immediately handed to
; the Stasis(klanker) application -- the standalone telephony controller
; (D-08, a later plan) owns everything from there (External Media channel,
; mixing bridge, the §24 silent answer-gate, greeting, hangup). There is NO
; outbound dialplan context anywhere in this file, and there will never be
; one added here -- a compromised or misused softphone endpoint has no
; extension, feature code, or Dial() application to reach that could place
; an outbound/toll call. This is the primary structural mitigation for
; T-11-02-01 (elevation-of-privilege via dialplan) and is enforced
; mechanically by tests/test_asterisk_configs.py.
;
; Per-DID SMS reply (quick task 260716-hg5 follow-up): on a shared VoIP.ms
; sub-account, ARI's dialplan.exten is the sub-account NAME, not the number the
; caller dialed -- but VoIP.ms carries the dialed DID in the SIP To: header.
; Stash that raw header into the KLANKER_SIP_TO channel variable BEFORE Stasis
; so the controller can read it via ARI (getChannelVar) and text the caller
; back FROM the exact DID they dialed. This is a READ of an inbound header into
; a channel var -- it opens no outbound path and is NOT a Dial()/feature-code
; (T-11-02-01 posture unchanged). ${PJSIP_HEADER(read,To)} is Asterisk dialplan
; syntax, not an env placeholder -- extensions.conf is bind-mounted verbatim
; (render_configs.py only renders ari.conf/pjsip.conf), so it is never
; ${VAR}-substituted at container start.
;
; Per-DID SMS reply v2 DIAGNOSTIC (quick task 260716-wgz, Step 1 of
; docs/superpowers/specs/2026-07-17-per-did-sms-reply-v2-plan.md): the To:
; header only ever carries the shared sub-account NAME (557010_klanker-pbx),
; never the dialed DID (live-proven). VoIP.ms often carries the dialed number
; in ANOTHER header, so stash FIVE more candidate values into channel vars for
; the controller to log once per call -- P-Called-Party-ID, Diversion,
; Remote-Party-ID, Contact (all ${PJSIP_HEADER(read,...)}), plus the dialed-
; number-identification service ${CALLERID(dnid)} (a dialplan FUNCTION, not a
; header). These are ADDITIONAL diagnostic READ-only captures of inbound SIP
; headers / dialplan functions: exactly like the To: capture they open no
; outbound path, add no Dial()/feature-code and no new context, so the
; T-11-02-01 posture is unchanged. Same bind-mount note applies -- every
; ${PJSIP_HEADER(...)} / ${CALLERID(...)} here is Asterisk dialplan syntax,
; never ${VAR}-substituted at container start.
[from-klanker-inbound]
exten => _X.,1,NoOp(Inbound call to klanker -- entering Stasis app)
 same => n,Set(KLANKER_SIP_TO=${PJSIP_HEADER(read,To)})
 same => n,Set(KLANKER_SIP_PCPID=${PJSIP_HEADER(read,P-Called-Party-ID)})
 same => n,Set(KLANKER_SIP_DIVERSION=${PJSIP_HEADER(read,Diversion)})
 same => n,Set(KLANKER_SIP_RPID=${PJSIP_HEADER(read,Remote-Party-ID)})
 same => n,Set(KLANKER_SIP_CONTACT=${PJSIP_HEADER(read,Contact)})
 same => n,Set(KLANKER_SIP_DNID=${CALLERID(dnid)})
 same => n,Answer()
 same => n,Stasis(klanker)
 same => n,Hangup()
