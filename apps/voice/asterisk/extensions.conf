; Inbound-only dialplan (Phase 11, D-01, spec §25.A).
;
; This file contains EXACTLY ONE context and it is inbound-only: every call
; that reaches [from-klanker-inbound] is answered and immediately handed to
; the Stasis(klanker) application -- the standalone telephony controller
; (D-08, a later plan) owns everything from there (External Media channel,
; mixing bridge, the §24 silent answer-gate, greeting, hangup). There is NO
; outbound dialplan context anywhere in this file, and there will never be
; one added here -- a compromised or misused softphone endpoint has no
; extension, feature code, or Dial() application to reach that could place
; an outbound/toll call. This is the primary structural mitigation for
; T-11-02-01 (elevation-of-privilege via dialplan) and is enforced
; mechanically by tests/test_asterisk_configs.py.
;
; Per-DID SMS reply -- resolve which DID the caller dialed on the SHARED VoIP.ms
; sub-account (quick 260716-hg5 → Approach C, quick 260717-buf, live-confirmed
; 2026-07-17). ARI's dialplan.exten is only the sub-account NAME, and the SIP
; To: header carries only that same name (live-proven 2026-07-16), so neither
; reveals the dialed DID. The FIX: VoIP.ms's per-DID "Caller ID name prefix"
; (setDIDInfo callerid_prefix) rides in the inbound caller-ID NAME, exposed by
; the ${CALLERID(name)} dialplan function -- stash it into KLANKER_SIP_CIDNAME
; BEFORE Stasis so the controller maps the tag → dialed DID (via ARI
; getChannelVar) and texts the caller back FROM the exact DID they dialed, with
; NO routing change. KLANKER_SIP_TO is kept as a dead last-ditch fallback.
; Both are READS of an inbound header/function into a channel var -- they open
; no outbound path and are NOT a Dial()/feature-code (T-11-02-01 posture
; unchanged). ${PJSIP_HEADER(read,To)} / ${CALLERID(name)} are Asterisk dialplan
; syntax, not env placeholders -- extensions.conf is bind-mounted verbatim
; (render_configs.py only renders ari.conf/pjsip.conf), so they are never
; ${VAR}-substituted at container start.
[from-klanker-inbound]
exten => _X.,1,NoOp(Inbound call to klanker -- entering Stasis app)
 same => n,Set(KLANKER_SIP_TO=${PJSIP_HEADER(read,To)})
 same => n,Set(KLANKER_SIP_CIDNAME=${CALLERID(name)})
 same => n,Answer()
 same => n,Stasis(klanker)
 same => n,Hangup()
