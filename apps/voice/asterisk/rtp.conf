; RTP port range -- narrowed to exactly the range docker-compose publishes
; (Phase 11, D-07). Asterisk's default range is much wider (10000-20000);
; a narrow, explicit range keeps the compose harness's published-port surface
; small and matches the External Media / bridge RTP traffic this dev harness
; actually needs (one call at a time, max_concurrent_calls=1).
;
; DEPLOY COUPLING (Phase 12): this range is ALSO the telephony-edge security
; group's RTP ingress window (infra/.../network module telephony_edge SG) and
; docker-compose.yml's published UDP ports. All three must stay identical --
; Asterisk allocates media only here, so anything the SG doesn't also open is
; silently dropped (this drifted once: SG=20000-20100 vs rtp.conf=10000-10020,
; and every inbound caller RTP packet was dropped -> the gate never heard the
; caller). Change all three together, in one commit.
[general]
rtpstart=10000
rtpend=10020
icesupport=no
strictrtp=no
