<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-label="Klanker Voice — tap the mic, or drop a quarter">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06070c"/>
      <stop offset="0.55" stop-color="#0b0d16"/>
      <stop offset="1" stop-color="#10121c"/>
    </linearGradient>
    <linearGradient id="wave" gradientUnits="userSpaceOnUse" x1="662" y1="0" x2="1182" y2="0">
      <stop offset="0" stop-color="#34f5d0"/>
      <stop offset="0.35" stop-color="#2de2c8"/>
      <stop offset="0.7" stop-color="#4ea8ff"/>
      <stop offset="1" stop-color="#8b7cf6"/>
    </linearGradient>
    <linearGradient id="voice" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34f5d0"/>
      <stop offset="1" stop-color="#4ea8ff"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#34f5d0"/>
      <stop offset="0.55" stop-color="#2de2c8"/>
      <stop offset="1" stop-color="#0e6e60"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#232636"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="340" rx="14" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="14" fill="url(#dots)" opacity="0.55"/>
  <rect x="1" y="1" width="1278" height="338" rx="13" fill="none" stroke="#232636" stroke-width="2"/>

  <!-- wordmark -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="64" y="128" font-size="64" font-weight="800" letter-spacing="6" fill="#e6e8ef">KLANKER</text>
    <text x="64" y="196" font-size="64" font-weight="800" letter-spacing="6" fill="url(#voice)">VOICE</text>
    <text x="66" y="238" font-size="19" letter-spacing="2" fill="#a6abbd" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">tap the mic. or drop a quarter.</text>
    <text x="66" y="272" font-size="14" letter-spacing="1" fill="#7c8296" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">VAD &#8594; STT &#8594; LLM &#8594; TTS &#183; &#8804;1.2s &#183; barge-in welcome</text>
  </g>

  <!-- the orb (browser door) -->
  <g filter="url(#glow)">
    <circle cx="608" cy="170" r="30" fill="url(#orb)"/>
  </g>
  <circle cx="608" cy="170" r="30" fill="none" stroke="#34f5d0" stroke-opacity="0.5"/>
  <!-- mic glyph inside orb -->
  <g stroke="#06070c" stroke-width="4" fill="none" stroke-linecap="round">
    <rect x="601" y="152" width="14" height="24" rx="7" fill="#06070c" stroke="none"/>
    <path d="M 596 170 a 12 12 0 0 0 24 0"/>
    <line x1="608" y1="182" x2="608" y2="189"/>
  </g>

  <!-- voice bars: orb to handset -->
  <g stroke="url(#wave)" stroke-width="7" stroke-linecap="round">
    <line x1="662" y1="160" x2="662" y2="180"/>
    <line x1="682" y1="148" x2="682" y2="192"/>
    <line x1="702" y1="134" x2="702" y2="206"/>
    <line x1="722" y1="152" x2="722" y2="188"/>
    <line x1="742" y1="120" x2="742" y2="220"/>
    <line x1="762" y1="142" x2="762" y2="198"/>
    <line x1="782" y1="108" x2="782" y2="232"/>
    <line x1="802" y1="150" x2="802" y2="190"/>
    <line x1="822" y1="128" x2="822" y2="212"/>
    <line x1="842" y1="156" x2="842" y2="184"/>
    <line x1="862" y1="138" x2="862" y2="202"/>
    <line x1="882" y1="118" x2="882" y2="222"/>
    <line x1="902" y1="150" x2="902" y2="190"/>
    <line x1="922" y1="132" x2="922" y2="208"/>
    <line x1="942" y1="158" x2="942" y2="182"/>
    <line x1="962" y1="144" x2="962" y2="196"/>
    <line x1="982" y1="162" x2="982" y2="178"/>
  </g>

  <!-- payphone (PSTN door) -->
  <g transform="translate(1032,74)">
    <rect x="0" y="0" width="150" height="192" rx="14" fill="#10121c" stroke="#232636" stroke-width="3"/>
    <rect x="0" y="0" width="150" height="192" rx="14" fill="none" stroke="url(#wave)" stroke-width="1.5" opacity="0.6"/>
    <!-- handset -->
    <g filter="url(#glow)">
      <path d="M 30 44 q 45 -26 90 0 l -9 18 q -36 -20 -72 0 Z" fill="#2de2c8"/>
    </g>
    <!-- coin slot -->
    <rect x="108" y="70" width="22" height="6" rx="3" fill="#f5a623"/>
    <!-- DTMF keypad -->
    <g fill="#e6e8ef">
      <g opacity="0.9">
        <circle cx="47" cy="98" r="8"/><circle cx="75" cy="98" r="8"/><circle cx="103" cy="98" r="8"/>
        <circle cx="47" cy="126" r="8"/><circle cx="75" cy="126" r="8"/><circle cx="103" cy="126" r="8"/>
        <circle cx="47" cy="154" r="8"/><circle cx="75" cy="154" r="8"/><circle cx="103" cy="154" r="8"/>
      </g>
      <g fill="#4ea8ff">
        <circle cx="75" cy="126" r="8"/>
      </g>
    </g>
    <text x="75" y="182" font-size="12" letter-spacing="1.5" text-anchor="middle" fill="#7c8296" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">NO QUARTERS NEEDED</text>
  </g>

  <!-- corner tag -->
  <text x="1216" y="46" font-size="14" text-anchor="end" letter-spacing="1" fill="#7c8296" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">a klanker family production</text>
</svg>
