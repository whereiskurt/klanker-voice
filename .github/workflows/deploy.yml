name: "Deploy: ECS Update"

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service being deployed (context only)'
        type: choice
        options:
          - voice
          - auth
          - telephony-edge
          - all
        default: all

  # Called by build-voice.yml / build-auth.yml / build-telephony-edge.yml after an image push
  workflow_call:
    inputs:
      service:
        description: 'Service being deployed (context only)'
        type: string
        default: 'all'

concurrency:
  group: deploy-ecs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ECS (${{ inputs.service }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      TG_BUCKET_USE1: tf-${{ vars.SITE_LABEL }}-use1-${{ vars.SGUID }}
      TG_TABLE_USE1: tf-${{ vars.SITE_LABEL }}-use1-${{ vars.SGUID }}
      SGUID: ${{ vars.SGUID }}
      TF_VAR_MANAGEMENT_ACCOUNT_ID: ${{ vars.TF_VAR_MANAGEMENT_ACCOUNT_ID }}
      TF_VAR_APPLICATION_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_GITHUB_ORG: ${{ github.repository_owner }}
      TF_VAR_SOPS_KMS_KEY_ID: ${{ vars.TF_VAR_SOPS_KMS_KEY_ID }}
      TF_VAR_SSM_KMS_KEY_ARNS: ${{ vars.TF_VAR_SSM_KMS_KEY_ARNS }}
      # NOTE: per-service image tags (TF_VAR_VOICE_IMAGE_TAG / TF_VAR_AUTH_IMAGE_TAG)
      # are resolved at runtime by the "Resolve per-service image tags" step below —
      # NOT hardcoded here. The ecs-task/ecs-service terragrunt units are shared
      # across both services, so hardcoding one service's tag to github.sha would
      # repoint the OTHER service's task to a non-existent image on every deploy
      # (a voice-vs-auth coupling landmine). The resolver sets the deploying
      # service to :sha and preserves the other service's currently-running tag.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Terragrunt and SOPS
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/terragrunt
            /usr/local/bin/sops
          key: tools-${{ runner.os }}-terragrunt-v0.97.1-sops-v3.11.0

      - name: Cache Terragrunt Provider Cache
        uses: actions/cache@v4
        with:
          path: ~/.terragrunt-cache
          key: terragrunt-providers-${{ runner.os }}-${{ hashFiles('infra/terraform/**/*.tf') }}
          restore-keys: |
            terragrunt-providers-${{ runner.os }}-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/kmv-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      # De-couple the shared ecs-task/ecs-service units: the service being deployed
      # gets the freshly-built :sha image; the OTHER services keep their currently-
      # running tag (queried from ECS) so applying the shared unit is a no-op for them.
      # This MUST cover telephony-edge too — the shared ecs-service unit includes it,
      # so without pinning its current tag here a voice/auth deploy silently reverts
      # the running telephony-edge image to service.hcl's hardcoded default.
      # First-deploy fallbacks mirror service.hcl get_env defaults: voice 0.1.0,
      # auth 0.0.0, telephony-edge the pinned RTP-pacing build.
      - name: Resolve per-service image tags (decouple shared ecs units)
        run: |
          CLUSTER="app-use1-${{ vars.SITE_LABEL }}"
          SHA="${{ github.sha }}"
          SVC="${{ inputs.service }}"
          TELE_DEFAULT="9c99a6ae14dfe99b37ec25d8c65543a292aac7fb"
          current_tag() {
            local td img
            td=$(aws ecs describe-services --cluster "$CLUSTER" --services "$1" \
                   --query 'services[0].taskDefinition' --output text 2>/dev/null || true)
            if [ -z "$td" ] || [ "$td" = "None" ]; then echo ""; return 0; fi
            img=$(aws ecs describe-task-definition --task-definition "$td" \
                    --query 'taskDefinition.containerDefinitions[0].image' --output text 2>/dev/null || true)
            echo "${img##*:}"
          }
          VOICE_CUR="$(current_tag voice-use1)"
          AUTH_CUR="$(current_tag auth-use1)"
          TELE_CUR="$(current_tag telephony-edge-use1)"
          case "$SVC" in
            voice)          VTAG="$SHA"; ATAG="${AUTH_CUR:-0.0.0}"; TTAG="${TELE_CUR:-$TELE_DEFAULT}";;
            auth)           ATAG="$SHA"; VTAG="${VOICE_CUR:-0.1.0}"; TTAG="${TELE_CUR:-$TELE_DEFAULT}";;
            telephony-edge) TTAG="$SHA"; VTAG="${VOICE_CUR:-0.1.0}"; ATAG="${AUTH_CUR:-0.0.0}";;
            *)              VTAG="$SHA"; ATAG="$SHA"; TTAG="$SHA";;
          esac
          echo "TF_VAR_VOICE_IMAGE_TAG=$VTAG" >> "$GITHUB_ENV"
          echo "TF_VAR_AUTH_IMAGE_TAG=$ATAG" >> "$GITHUB_ENV"
          echo "TF_VAR_TELEPHONY_EDGE_IMAGE_TAG=$TTAG" >> "$GITHUB_ENV"
          echo "Resolved image tags — voice:$VTAG  auth:$ATAG  telephony-edge:$TTAG  (deploying: $SVC)"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          if [ ! -f /usr/local/bin/terragrunt ]; then
            curl -Lo /usr/local/bin/terragrunt \
              "https://github.com/gruntwork-io/terragrunt/releases/download/v0.97.1/terragrunt_linux_amd64"
            chmod +x /usr/local/bin/terragrunt
          fi
          terragrunt --version

      - name: Setup SOPS
        run: |
          if [ ! -f /usr/local/bin/sops ]; then
            curl -Lo /usr/local/bin/sops \
              "https://github.com/getsops/sops/releases/download/v3.11.0/sops-v3.11.0.linux.amd64"
            chmod +x /usr/local/bin/sops
          fi
          sops --version

      # Deploy = terragrunt apply limited to the ecs-task / ecs-service units.
      # While site.hcl keeps ecs_tasks.enabled / ecs_services.enabled = false
      # (Phase 2 state), the exclude blocks make this a clean no-op — Phase 3
      # flips the flags and this workflow starts deploying with no edits.
      - name: Terragrunt Apply (ecs-task, ecs-service)
        id: apply
        working-directory: infra/terraform/live/site
        env:
          TG_PROVIDER_CACHE: "1"
        run: |
          for MODULE in ecs-task ecs-service; do
            echo "=== Applying $MODULE ==="
            (cd "region/us-east-1/$MODULE" && terragrunt apply --no-color --non-interactive -auto-approve) 2>&1 | tee -a deploy_output.txt
            exit_code=${PIPESTATUS[0]}
            if [ "$exit_code" -ne 0 ]; then
              exit "$exit_code"
            fi
          done

      - name: Write Job Summary
        if: always()
        run: |
          STATUS=$([[ "${{ steps.apply.outcome }}" == "success" ]] && echo "PASS" || echo "FAIL")
          echo "## ECS Deploy: ${STATUS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ inputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
