name: "Build: Auth"

on:
  # D-08: apps/auth/** changes on main build + deploy the auth service
  push:
    branches: [main]
    paths:
      - 'apps/auth/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Push Auth Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      has_dockerfile: ${{ steps.guard.outputs.has_dockerfile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Phase 5 deploy: the auth image is the Next.js standalone webapp at
      # apps/auth/webapp/Dockerfile.webapp (build context = apps/auth/webapp).
      - name: Check for Dockerfile
        id: guard
        run: |
          if [ -f apps/auth/webapp/Dockerfile.webapp ]; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
            echo "## Auth Build Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No Dockerfile at \`apps/auth/webapp/Dockerfile.webapp\` — build is a no-op." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure AWS Credentials
        if: steps.guard.outputs.has_dockerfile == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/kmv-github-release
          aws-region: us-east-1

      - name: Login to Amazon ECR
        if: steps.guard.outputs.has_dockerfile == 'true'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        if: steps.guard.outputs.has_dockerfile == 'true'
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/${{ vars.SITE_LABEL }}-auth-app:${{ github.sha }}
        run: |
          docker build -f apps/auth/webapp/Dockerfile.webapp -t "$IMAGE" apps/auth/webapp
          docker push "$IMAGE"
          echo "## Auth Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`$IMAGE\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy Auth
    needs: build
    if: needs.build.outputs.has_dockerfile == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      service: auth
